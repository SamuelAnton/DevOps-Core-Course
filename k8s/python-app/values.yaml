replicaCount: 5

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

image:
  repository: damirsadykov/devops-info-service
  tag: "latest"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: ""

# Environment variables for the container
env:
  - name: PORT
    value: "5000"
  - name: HOST
    value: "0.0.0.0"
  - name: DEBUG
    value: "false"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Liveness probe configuration (customizable)
livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /ready
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3
  failureThreshold: 3

secrets:
  apiKey: "dev-key"
  dbPassword: "dev-db-pass"
  adminPassword: "dev-admin-pass"

serviceAccount:
  name: my-python-app-sa

environment: "development"
logLevel: "info"
features:
  metrics: true
  debug: false

fullnameOverride: "my-python-app"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""  # Use default storage class (works in Minikube)