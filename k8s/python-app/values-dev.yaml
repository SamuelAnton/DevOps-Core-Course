# k8s/python-app/values-dev.yaml
replicaCount: 1

image:
  tag: "latest"
  pullPolicy: Always

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

service:
  type: NodePort
  port: 80

env:
  - name: DEBUG
    value: "true"

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 5000
  initialDelaySeconds: 3
  periodSeconds: 3
  failureThreshold: 3