apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "python-app.fullname" . }}-post-install"
  labels:
    {{- include "python-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: smoketest
        image: curlimages/curl:latest
        command:
          - sh
          - -c
          - |
            echo "Post-install hook: waiting for service to be ready..."
            # Service DNS name (works inside cluster)
            SERVICE_URL="http://{{ include "python-app.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
            
            # Wait up to 60 seconds for the service to respond
            for i in $(seq 1 12); do
              echo "Attempt $i: curling $SERVICE_URL/health"
              if curl --fail --silent --output /dev/null "$SERVICE_URL/health"; then
                echo "✓ Service is healthy"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "✗ Service failed to become ready"
                exit 1
              fi
              sleep 5
            done
            
            # Final test of the main endpoint
            echo "Testing main endpoint..."
            curl --fail --silent "$SERVICE_URL/" || exit 1
            
            echo "✓ Smoke test passed!"