apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "python-app.fullname" . }}
  labels:
    {{- include "python-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "python-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "python-app.selectorLabels" . | nindent 8 }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "myapp-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/myapp/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{ "{{" }}- with secret "secret/myapp/config" -{{ "}}" }}
          # Environment variables generated by Vault Agent
          USERNAME={{ "{{" }} .Data.data.username {{ "}}" }}
          PASSWORD={{ "{{" }} .Data.data.password {{ "}}" }}
          {{ "{{" }}- end -{{ "}}" }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "python-app.fullname" . }}-data
        - name: config-volume
          configMap:
            name: {{ include "python-app.fullname" . }}-config
      securityContext:
        fsGroup: 1000 
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "python-app.fullname" . }}-env
          env:
            - name: PORT
              value: "5000"
            - name: HOST
              value: "0.0.0.0"
            - name: DEBUG
              value: "false"
            {{- include "python-app.secretEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: config-volume
              mountPath: /config
              readOnly: true