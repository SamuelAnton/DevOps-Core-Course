# k8s/python-app/values-prod.yaml
replicaCount: 5

image:
  tag: "1.3.0"
  pullPolicy: IfNotPresent

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"

service:
  type: LoadBalancer
  port: 80

env:
  - name: DEBUG
    value: "false"

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 3
  failureThreshold: 3