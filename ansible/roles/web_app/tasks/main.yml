---
# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Ensure docker-compose Python library is installed (for older modules)
  pip:
    name: docker-compose
    state: present
  become: yes
  tags: always
  when: false 

- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      file:
        path: "{{ compose_project_dir | default('/opt/' + app_name) }}"
        state: directory
        mode: '0755'
      become: yes

    - name: Template docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir | default('/opt/' + app_name) }}/docker-compose.yml"
        mode: '0644'
      become: yes
      register: compose_file

    - name: Log in to Docker Hub (if credentials provided)
      docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        reauthorize: yes
      become: no
      no_log: true
      when: dockerhub_username is defined and dockerhub_password is defined

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir | default('/opt/' + app_name) }}"
        state: present
        pull: always
        remove_orphans: yes
      become: no
      register: compose_result

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        host: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
        delay: 5
        timeout: 60
        state: started
      become: no
      when: compose_result is changed

    - name: Check health endpoint
      uri:
        url: "http://{{ ansible_default_ipv4.address | default('127.0.0.1') }}:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 5
      register: health_check
      until: health_check.status == 200
      retries: 5
      delay: 2
      become: no
      when: compose_result is changed

  rescue:
    - name: Log deployment failure
      debug:
        msg: "Deployment failed! Check logs at {{ compose_project_dir }}/docker-compose.yml"
      failed_when: true

  always:
    - name: Show deployment status
      debug:
        msg:
          - "Application deployed with Docker Compose"
          - "Project directory: {{ compose_project_dir | default('/opt/' + app_name) }}"
          - "Container status: run 'docker ps' on target"

  tags:
    - web_app
    - compose
    - deploy