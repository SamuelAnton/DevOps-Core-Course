---
- name: Log in to Docker Hub
  docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  become: no
  no_log: true

- name: Pull Docker image
  docker_image:
    name: "{{ dockerhub_username }}/{{ app_name }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: yes
  become: no
  register: pull_result
  notify: restart app container

- name: Check if container is running
  docker_container_info:
    name: "{{ app_container_name }}"
  become: no
  register: container_info

- name: Stop existing container if running
  docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  become: no
  when: container_info.exists and container_info.container.State.Running
  ignore_errors: yes

- name: Remove old container if exists
  docker_container:
    name: "{{ app_container_name }}"
    state: absent
  become: no
  when: container_info.exists

- name: Run new container
  docker_container:
    name: "{{ app_container_name }}"
    image: "{{ dockerhub_username }}/{{ app_name }}:{{ docker_image_tag }}"
    state: "{{ container_state }}"
    restart_policy: "{{ restart_policy }}"
    ports:
      - "{{ app_port }}:{{ app_port }}"
    env:
      APP_NAME: "{{ app_name }}"
      APP_PORT: "{{ app_port | string }}"
      ENVIRONMENT: "{{ app_environment.ENVIRONMENT }}"
    pull: false
  become: no
  register: container_run

- name: Wait for application to be ready
  wait_for:
    port: "{{ app_port }}"
    host: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
    delay: "{{ health_check_delay }}"
    timeout: "{{ health_check_retries * health_check_delay }}"
    state: started
  become: no
  when: container_run.changed or (container_info is defined and not container_info.exists)

- name: Check health endpoint
  uri:
    url: "http://{{ ansible_default_ipv4.address | default('127.0.0.1') }}:{{ app_port }}{{ health_check_endpoint }}"
    method: GET
    status_code: 200
    timeout: 5
  register: health_check
  until: health_check.status == 200
  retries: 5
  delay: 2
  become: no
  when: container_run.changed or (container_info is defined and not container_info.exists)

- name: Display container info
  debug:
    msg:
      - "Application deployed successfully!"
      - "Container: {{ app_container_name }}"
      - "Port: {{ app_port }}"
      - "Health endpoint: http://{{ ansible_default_ipv4.address }}:{{ app_port }}{{ health_check_endpoint }}"
      - "Main endpoint: http://{{ ansible_default_ipv4.address }}:{{ app_port }}/"
  when: container_run.changed or (container_info is defined and not container_info.exists)